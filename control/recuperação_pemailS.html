<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperação de Senha - CONNECTA</title>
    <link rel="stylesheet" href="/css/style_recuperacao.css">
    <link rel="icon" href="/Imagens/connecta.ico" type="image/x-icon">
</head>
<body>
    <div class="recover-wrap">
        <div class="recover-logo">
            <img src="../Imagens/connecta.ico" alt="Connecta">
        </div>
        <h1 class="recover-title">CONNECTA</h1>
        <p class="recover-subtitle">Informe o e-mail cadastrado que enviaremos instruções de recuperação</p>

        <form id="recover-form" class="recover-form" novalidate>
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="seu@email.com" required>

            <button type="submit">Enviar link de recuperação</button>
            <div id="message" class="recover-msg"></div>
        </form>

        <div class="recover-footer">
            <a href="../login/login.html">← Voltar para login</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('recover-form');
        const message = document.getElementById('message');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const email = form.email.value.trim();
            if (!email) {
                message.textContent = 'Por favor informe um e-mail válido.';
                message.style.color = '#e11d48';
                return;
            }

            message.style.color = '#276749';
            message.textContent = 'Pronto! Enviamos as instruções para ' + email + '. Verifique sua caixa de entrada.';
            form.reset();

            setTimeout(() => {
                message.textContent = '';
            }, 9000);
        });
    </script>
</body>
</html>
