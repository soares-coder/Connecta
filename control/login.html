<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONNECTA</title>
    <link rel="stylesheet" href="../css/login.css">
    <link rel="icon" href="../Imagens/connecta.ico" type="image/x-icon">
</head>
<body>
    <div class="login-container">
   <!-- section para titulos e subtitulos -->
    <section>
        <div class="logo">
            <img src="../Imagens/Logo connecta.png" alt="Logo CONNECTA" style="max-width: 300px; width: 100%; height: auto;">


        <h3 class="subtitle">Bem-vindo ao Connecta - Aluno</h3>
    </section>
    <!-- section para o formulário de login -->
    <section>
        <form action="login.html" method="POST">
            <label for="email">E-mail</label>
            <input type="email" name="email" id="email_log" placeholder="Digite seu e-mail" required>

            <label for="password">Senha</label>
            <input type="password" name="password" id="password_log" placeholder="Digite sua senha" required>

            <div class="forgot-password"><a href="../control/recuperação_aluno.html">Esqueceu sua senha?</a></div>

            <button type="submit">ENTRAR</button>
        </form>
    </section>

        <div class="divider"><span></span></div>

        <div class="signup">
            <p>Não tem uma conta? <a href="../control/cadastro.html">Cadastre-se</a></p>
        </div>
    </div>
</body>
</html>
