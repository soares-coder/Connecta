<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/feed_professor.css">
    <link rel="icon" type="image/x-icon" href="../Imagens/connecta.ico">
    <title>Feed Professor</title>
</head>
<body>
    <header class="topbar">
        <div class="top-title">
            <h1 class="connecta">Connecta</h1>
            <input id="searchPosts" type="search" placeholder="Pesquisar" aria-label="Pesquisar posts" />
        </div>
    </header>

    <main class="layout">
        <aside class="menu-lateral">
            <nav class="navbar-nav flex-column">
                <a href="#home" class="nav-link menu-item active">
                    <i class="bi bi-house-door"></i>
                    <span>Home</span>
                </a>
                <a href="#perfil" class="nav-link menu-item">
                    <i class="bi bi-person-circle"></i>
                    <span>Perfil</span>
                </a>
                <a href="#disciplina" class="nav-link menu-item">
                    <i class="bi bi-book"></i>
                    <span>Disciplina</span>
                </a>
                <a href="#grupo" class="nav-link menu-item">
                    <i class="bi bi-people"></i>
                    <span>Grupo de Alunos</span>
                </a>
            </nav>
        </aside>

        <section class="feed-area">
            <div class="post-box">
                <h2>Publicar no Feed</h2>
                <textarea id="postText" placeholder="Escreva algo para a turma..."></textarea>
                <button id="postButton" class="btn">Postar</button>
            </div>

            <div id="postsContainer" class="posts-container" aria-live="polite"></div>
        </section>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        const posts = [
            { author: 'Paulo (Aluno)', text: 'Alguém pode compartilhar o material da aula anterior?', date: new Date().toLocaleString() },
            { author: 'Mariana (Professor)', text: 'Lembrete: atividade 2 até sexta-feira.', date: new Date().toLocaleString() }
        ];

        const postsContainer = document.getElementById('postsContainer');
        const postText = document.getElementById('postText');
        const postButton = document.getElementById('postButton');
        const searchPosts = document.getElementById('searchPosts');

        // Menu lateral ativo
        const menuItems = document.querySelectorAll('.menu-item');
        menuItems.forEach(item => {
            item.addEventListener('click', (e) => {
                menuItems.forEach(i => i.classList.remove('active'));
                item.classList.add('active');
            });
        });

        function renderPosts(filter = '') {
            const query = filter.toLowerCase().trim();
            postsContainer.innerHTML = '';
            const filtered = posts.filter(p => p.text.toLowerCase().includes(query) || p.author.toLowerCase().includes(query));
            if (filtered.length === 0) {
                postsContainer.innerHTML = '<p class="empty">Nenhum post encontrado.</p>';
                return;
            }
            filtered.reverse().forEach(post => {
                const card = document.createElement('article');
                card.className = 'post-card';
                card.innerHTML = `
                    <div class="post-header">
                        <strong>${post.author}</strong>
                        <span>${post.date}</span>
                    </div>
                    <p>${post.text}</p>
                `;
                postsContainer.appendChild(card);
            });
        }

        postButton.addEventListener('click', () => {
            const text = postText.value.trim();
            if (!text) {
                alert('Digite uma mensagem antes de postar.');
                return;
            }
            posts.push({ author: 'Você (Professor)', text, date: new Date().toLocaleString() });
            postText.value = '';
            renderPosts(searchPosts.value);
        });

        searchPosts.addEventListener('input', e => renderPosts(e.target.value));

        renderPosts();
    </script>
</body>
</html>
